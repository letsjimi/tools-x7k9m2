<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BPM → MS Converter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #fff;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 40px;
            max-width: 800px;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 40px;
            font-size: 1rem;
        }

        .input-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .bpm-display {
            text-align: center;
            margin-bottom: 20px;
        }

        .bpm-value {
            font-size: 4rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
        }

        .bpm-label {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .input-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 12px;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn:hover {
            transform: scale(1.1);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: scale(0.95);
        }

        input[type="number"] {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 15px 25px;
            font-size: 1.5rem;
            color: white;
            text-align: center;
            width: 120px;
            outline: none;
            transition: all 0.3s ease;
        }

        input[type="number"]:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.3);
        }

        .slider-container {
            margin-top: 20px;
        }

        input[type="range"] {
            width: 100%;
            height: 8px;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.1);
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(102, 126, 234, 0.5);
            transition: transform 0.2s;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 30px;
        }

        .result-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .result-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .result-card:hover::before {
            opacity: 1;
        }

        .result-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .note-value {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .ms-value {
            font-size: 2rem;
            font-weight: 700;
            color: #fff;
        }

        .ms-label {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 5px;
        }

        .highlight {
            background: rgba(102, 126, 234, 0.2);
            border-color: rgba(102, 126, 234, 0.5);
        }

        .keyboard-hint {
            text-align: center;
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.5);
        }

        .keyboard-hint kbd {
            background: rgba(255, 255, 255, 0.2);
            padding: 3px 8px;
            border-radius: 4px;
            font-family: monospace;
            color: #fff;
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .bpm-value { font-size: 3rem; }
            .container { padding: 25px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>BPM → MS Converter</h1>
        <p class="subtitle">Musikalische Zeitwerte berechnen</p>

        <div class="input-section">
            <div class="bpm-display">
                <div class="bpm-value" id="bpmDisplay">120</div>
                <div class="bpm-label">BPM</div>
            </div>

            <div class="input-controls">
                <button class="btn" onclick="changeBPM(-1)" title="Pfeil nach unten">−</button>
                <input type="number" id="bpmInput" value="120" min="1" max="999" step="1">
                <button class="btn" onclick="changeBPM(1)" title="Pfeil nach oben">+</button>
            </div>

            <div class="slider-container">
                <input type="range" id="bpmSlider" min="1" max="300" value="120">
            </div>

            <div class="keyboard-hint">
                <kbd>↑</kbd> <kbd>↓</kbd> Pfeiltasten zum Anpassen • Direkte Eingabe möglich
            </div>
        </div>

        <div class="results-grid" id="resultsGrid">
            <!-- Werte werden per JavaScript eingefügt -->
        </div>
    </div>

    <script>
        const bpmInput = document.getElementById('bpmInput');
        const bpmSlider = document.getElementById('bpmSlider');
        const bpmDisplay = document.getElementById('bpmDisplay');
        const resultsGrid = document.getElementById('resultsGrid');

        // Notenwerte Konfiguration
        const noteValues = [
            { name: 'Ganze Note (1/1)', fraction: 4, highlight: false },
            { name: 'Halbe Note (1/2)', fraction: 2, highlight: false },
            { name: 'Viertelnote (1/4)', fraction: 1, highlight: true },
            { name: 'Achtelnote (1/8)', fraction: 0.5, highlight: true },
            { name: 'Sechzehntel (1/16)', fraction: 0.25, highlight: false },
            { name: 'Zweiunddreißigstel (1/32)', fraction: 0.125, highlight: false },
            { name: 'Viertel-Triole', fraction: 2/3, highlight: true },
            { name: 'Achtel-Triole', fraction: 1/3, highlight: false },
            { name: 'Sechzehntel-Triole', fraction: 1/6, highlight: false },
            { name: 'Punktierte 1/4', fraction: 1.5, highlight: false },
            { name: 'Punktierte 1/8', fraction: 0.75, highlight: false },
            { name: 'Punktierte 1/16', fraction: 0.375, highlight: false }
        ];

        function calculateMS(bpm, fraction) {
            // Ein Viertel = 60000 / BPM
            // Andere Notenwerte sind relativ zum Viertel
            return (60000 / bpm) * fraction;
        }

        function formatMS(ms) {
            if (ms >= 1000) {
                return (ms / 1000).toFixed(2) + ' s';
            } else if (ms >= 10) {
                return ms.toFixed(1) + ' ms';
            } else {
                return ms.toFixed(2) + ' ms';
            }
        }

        function updateDisplay() {
            const bpm = parseInt(bpmInput.value) || 120;
            bpmDisplay.textContent = bpm;
            bpmSlider.value = bpm;

            resultsGrid.innerHTML = '';

            noteValues.forEach(note => {
                const ms = calculateMS(bpm, note.fraction);
                const card = document.createElement('div');
                card.className = 'result-card' + (note.highlight ? ' highlight' : '');
                card.innerHTML = `
                    <div class="note-value">${note.name}</div>
                    <div class="ms-value">${formatMS(ms)}</div>
                    <div class="ms-label">Millisekunden</div>
                `;
                resultsGrid.appendChild(card);
            });
        }

        function changeBPM(delta) {
            let newValue = parseInt(bpmInput.value) + delta;
            if (newValue < 1) newValue = 1;
            if (newValue > 999) newValue = 999;
            bpmInput.value = newValue;
            updateDisplay();
        }

        // Event Listeners
        bpmInput.addEventListener('input', updateDisplay);
        
        bpmSlider.addEventListener('input', (e) => {
            bpmInput.value = e.target.value;
            updateDisplay();
        });

        // Tastatursteuerung
        document.addEventListener('keydown', (e) => {
            if (document.activeElement === bpmInput) {
                if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    changeBPM(1);
                } else if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    changeBPM(-1);
                }
            } else {
                if (e.key === 'ArrowUp') {
                    changeBPM(1);
                } else if (e.key === 'ArrowDown') {
                    changeBPM(-1);
                }
            }
        });

        // Initialisierung
        updateDisplay();

        // Fokus auf Input beim Start
        bpmInput.focus();
        bpmInput.select();
    </script>
</body>
</html>
