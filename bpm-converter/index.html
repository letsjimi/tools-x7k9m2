<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worship BPM Converter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
            color: #fff;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 20px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            text-align: center;
            font-size: 1.5rem;
            margin-bottom: 4px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 15px;
            font-size: 0.75rem;
        }

        .input-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .bpm-display {
            text-align: center;
            margin-bottom: 10px;
        }

        .bpm-value {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
        }

        .bpm-label {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .input-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            color: white;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 15px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-clear {
            background: rgba(231, 76, 60, 0.8);
            width: 50px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-clear:hover {
            background: rgba(231, 76, 60, 1);
        }

        /* NumPad Grid */
        .numpad-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 5px;
            margin-top: 10px;
        }

        .numpad-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 6px;
            padding: 10px 5px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s ease;
            user-select: none;
        }

        .numpad-btn:hover {
            background: rgba(102, 126, 234, 0.3);
            border-color: rgba(102, 126, 234, 0.5);
        }

        .numpad-btn:active {
            transform: scale(0.95);
            background: rgba(102, 126, 234, 0.5);
        }

        input[type="number"] {
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            padding: 10px 15px;
            font-size: 1.2rem;
            color: white;
            text-align: center;
            width: 90px;
            outline: none;
            transition: all 0.2s ease;
        }

        input[type="number"]:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.3);
        }

        .slider-container {
            margin-top: 12px;
        }

        .slider-labels {
            display: flex;
            justify-content: space-between;
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 4px;
            padding: 0 2px;
        }

        input[type="range"] {
            width: 100%;
            height: 5px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.1);
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            cursor: pointer;
            box-shadow: 0 3px 8px rgba(102, 126, 234, 0.5);
            transition: transform 0.2s;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            cursor: pointer;
            border: none;
            box-shadow: 0 3px 8px rgba(102, 126, 234, 0.5);
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        .result-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 10px 6px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .result-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .result-card:hover::before {
            opacity: 1;
        }

        .result-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .note-symbol {
            font-size: 1.3rem;
            margin-bottom: 2px;
            line-height: 1;
        }

        .note-value {
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 3px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .ms-value {
            font-size: 0.95rem;
            font-weight: 600;
            color: #fff;
            font-variant-numeric: tabular-nums;
        }

        .highlight {
            background: rgba(102, 126, 234, 0.2);
            border-color: rgba(102, 126, 234, 0.4);
        }

        .highlight .note-value {
            color: rgba(200, 200, 255, 0.8);
        }

        @media (max-width: 500px) {
            h1 { font-size: 1.3rem; }
            .bpm-value { font-size: 1.8rem; }
            .results-grid { grid-template-columns: repeat(3, 1fr); }
            .container { padding: 15px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Worship BPM Converter</h1>
        <p class="subtitle">Bethel • Hillsong • Outbreakband • Elevation</p>

        <div class="input-section">
            <div class="bpm-display">
                <div class="bpm-value" id="bpmDisplay">120</div>
                <div class="bpm-label">BPM</div>
            </div>

            <div class="input-controls">
                <button class="btn" onclick="changeBPM(-1)" title="-1 BPM">−</button>
                <input type="number" id="bpmInput" value="120" min="60" max="150" step="1" readonly>
                <button class="btn" onclick="changeBPM(1)" title="+1 BPM">+</button>
                <button class="btn btn-clear" onclick="clearBPM()" title="Zurücksetzen">Clear</button>
            </div>

            <!-- NumPad -->
            <div class="numpad-grid">
                <button class="numpad-btn" onclick="addDigit('1')">1</button>
                <button class="numpad-btn" onclick="addDigit('2')">2</button>
                <button class="numpad-btn" onclick="addDigit('3')">3</button>
                <button class="numpad-btn" onclick="addDigit('4')">4</button>
                <button class="numpad-btn" onclick="addDigit('5')">5</button>
                <button class="numpad-btn" onclick="addDigit('6')">6</button>
                <button class="numpad-btn" onclick="addDigit('7')">7</button>
                <button class="numpad-btn" onclick="addDigit('8')">8</button>
                <button class="numpad-btn" onclick="addDigit('9')">9</button>
                <button class="numpad-btn" onclick="addDigit('0')" style="grid-column: span 2;">0</button>
            </div>

            <div class="slider-container">
                <div class="slider-labels">
                    <span>60</span>
                    <span>72</span>
                    <span>96</span>
                    <span>120</span>
                    <span>150</span>
                </div>
                <input type="range" id="bpmSlider" min="60" max="150" value="120">
            </div>
        </div>

        <div class="results-grid" id="resultsGrid">
            <!-- Werte werden per JavaScript eingefügt -->
        </div>
    </div>

    <script>
        const bpmInput = document.getElementById('bpmInput');
        const bpmSlider = document.getElementById('bpmSlider');
        const bpmDisplay = document.getElementById('bpmDisplay');
        const resultsGrid = document.getElementById('resultsGrid');

        let currentInput = '120';

        // Worship-optimierte Notenwerte
        const noteValues = [
            { symbol: '♩.', name: '¼ punkt.', fraction: 1.5, highlight: true },  // #1 used in worship
            { symbol: '♩', name: 'Viertel', fraction: 1, highlight: true },     // Standard pulse
            { symbol: '3', name: '¼ Triole', fraction: 2/3, highlight: false },
            { symbol: '♪.', name: '⅛ punkt.', fraction: 0.75, highlight: true }, // #2 used - modern worship
            { symbol: '♪', name: 'Achtel', fraction: 0.5, highlight: true },     // Standard sub
            { symbol: '3', name: '⅛ Triole', fraction: 1/3, highlight: false },
            { symbol: '𝅘𝅥𝅯', name: '16tel', fraction: 0.25, highlight: false },
            { symbol: '𝅗𝅥', name: 'Halbe', fraction: 2, highlight: false }       // Pads/Swells
        ];

        function calculateMS(bpm, fraction) {
            return (60000 / bpm) * fraction;
        }

        function formatMS(ms) {
            if (ms >= 100) {
                return Math.round(ms) + 'ms';
            } else if (ms >= 10) {
                return Math.round(ms) + 'ms';
            } else {
                return ms.toFixed(1) + 'ms';
            }
        }

        function updateDisplay() {
            let bpm = parseInt(currentInput) || 120;
            // Worship Range: 60-150
            if (bpm < 60) bpm = 60;
            if (bpm > 150) bpm = 150;
            
            bpmInput.value = bpm;
            bpmDisplay.textContent = bpm;
            bpmSlider.value = bpm;

            resultsGrid.innerHTML = '';

            noteValues.forEach(note => {
                const ms = calculateMS(bpm, note.fraction);
                const card = document.createElement('div');
                card.className = 'result-card' + (note.highlight ? ' highlight' : '');
                card.innerHTML = `
                    <div class="note-symbol">${note.symbol}</div>
                    <div class="note-value">${note.name}</div>
                    <div class="ms-value">${formatMS(ms)}</div>
                `;
                resultsGrid.appendChild(card);
            });
        }

        function changeBPM(delta) {
            let newValue = parseInt(currentInput) + delta;
            if (newValue < 60) newValue = 60;
            if (newValue > 150) newValue = 150;
            currentInput = newValue.toString();
            updateDisplay();
        }

        function addDigit(digit) {
            if (currentInput.length >= 3) {
                currentInput = digit;
            } else {
                currentInput = currentInput + digit;
            }
            // Entferne führende Nullen
            currentInput = currentInput.replace(/^0+/, '') || '0';
            updateDisplay();
        }

        function clearBPM() {
            currentInput = '120';
            updateDisplay();
        }

        // Slider
        bpmSlider.addEventListener('input', (e) => {
            currentInput = e.target.value;
            updateDisplay();
        });

        // Tastatur (Pfeiltasten)
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp') {
                e.preventDefault();
                changeBPM(1);
            } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                changeBPM(-1);
            } else if (e.key >= '0' && e.key <= '9') {
                addDigit(e.key);
            } else if (e.key === 'Escape' || e.key === 'c' || e.key === 'C') {
                clearBPM();
            }
        });

        // Initialisierung
        updateDisplay();
    </script>
</body>
</html>
